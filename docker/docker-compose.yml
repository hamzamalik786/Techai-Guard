version: "3.8"
services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: techuai
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ../techuai/backend
    working_dir: /app
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/techuai
    depends_on:
      - postgres
    ports:
      - "4000:4000"

  frontend:
    build: ../techuai/frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
    name: techuai_pgdata
